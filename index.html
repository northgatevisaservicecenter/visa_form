<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthGate Global Visa Application</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .form-container { background: #ffffff; max-width: 850px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #1a2a6c; margin-top: 20px; margin-bottom: 40px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 180px; height: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .header h2 { color: #1a2a6c; margin: 0; font-size: 24px; text-transform: uppercase; }
        .section-title { background: #f8f9fa; color: #1a2a6c; padding: 12px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; margin: 30px 0 15px 0; border-left: 5px solid #1a2a6c; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #333; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: 1 / -1; }
        
        /* Hidden Containers */
        #countries_container, #refusal_container, #spouse_field, #children_field { display: none; }

        .declaration-box { grid-column: 1 / -1; margin-top: 30px; padding: 20px; background: #fff9e6; border-radius: 8px; font-size: 14px; display: flex; align-items: flex-start; gap: 15px; border: 1px solid #ffeeba; width: 100%; box-sizing: border-box; }
        .declaration-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; margin-top: 2px; flex-shrink: 0; }
        .submit-btn { width: 100%; padding: 18px; background-color: #1a2a6c; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s ease; }
        .submit-btn:hover { background-color: #0d1a44; }
        .submit-btn:disabled { background-color: #cccccc; }
        
        .modal-btn-secondary { width: 100%; padding: 15px; background-color: #f0f2f5; color: #333; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s ease; text-decoration: text-decoration; display: inline-block; box-sizing: border-box; }
        .modal-btn-secondary:hover { background-color: #e2e8e6; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 12% auto; padding: 40px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="logo-container"><img src="logo.png" alt="NorthGate Logo"></div>
    <div class="header">
        <p><strong>Visa Application Form</strong></p>
    </div>

    <form id="masterForm">
        <input type="hidden" name="form_type" value="Other">

        <!-- 1. Applicant Details (Ab yeh sabse shuru me hai) -->
        <div class="section-title">👤 Applicant Details</div>
        <div class="grid">
            <div class="input-group"><label>Full Name *</label><input type="text" name="full_name" required></div>
            <div class="input-group"><label>Father’s / Husband’s Name *</label><input type="text" name="father_name" required></div>
            <div class="input-group"><label>Date of Birth *</label><input type="date" name="dob" required></div>
            <div class="input-group"><label>CNIC / Passport No *</label><input type="text" name="passport" required></div>
            <div class="input-group"><label>Passport Expiry Date</label><input type="date" name="passport_expiry"></div>
            <div class="input-group"><label>Nationality *</label><input type="text" name="nationality" required></div>
            <div class="input-group"><label>Contact Number *</label><input type="text" name="contact" required></div>
            <div class="input-group"><label>Email Address *</label><input type="email" name="email_id" required></div>
            <div class="input-group">
                <label>Marital Status *</label>
                <select name="marital_status" onchange="toggleMaritalFields(this.value)" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Widowed">Widowed</option>
                    <option value="Divorced">Divorced</option>
                </select>
            </div>
        </div>

        <!-- 2. Family Information -->
        <div class="section-title">👨‍👩‍👧 Family Information</div>
        <div class="grid">
            <div class="input-group"><label>Number of Dependents</label><input type="number" name="dependents" value="0"></div>
            <div class="input-group" id="spouse_field"><label>Spouse Name (if applicable)</label><input type="text" name="spouse_name"></div>
            <div class="input-group full-width" id="children_field"><label>Children Details(if Any)</label><textarea name="children_details" rows="2"></textarea></div>
        </div>

        <!-- 3. Destination Details (Ab yeh Travel History se pehle hai!) -->
        <div class="section-title">🌍 Destination Details</div>
        <div class="grid">
            <div class="input-group"><label>Target Country *</label><input type="text" name="target_country" required></div>
            <div class="input-group">
                <label>Visa Category *</label>
                <select name="visa_category" required>
                    <option value="">Select Category</option>
                    <option value="Tourist/Visit">Tourist / Visit</option>
                    <option value="Business">Business</option>
                    <option value="Student">Student</option>
                    <option value="Work">Work Permit</option>
                </select>
            </div>
            <div class="input-group"><label>Expected Travel Date</label><input type="date" name="travel_date"></div>
        </div>

        <!-- 4. Travel History -->
        <div class="section-title">🌍 Travel History</div>
        <div class="grid">
            <div class="input-group full-width">
                <label>Have you travelled internationally before? *</label>
                <select name="intl_travel" id="intl_travel" onchange="toggleCountries()" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="input-group full-width" id="countries_container">
                <label>Countries Visited</label>
                <textarea name="countries_visited" id="countries_visited" rows="2"></textarea>
            </div>
            <div class="input-group">
                <label>Any Previous Refusal? *</label>
                <select name="refusal_history" id="refusal_history" onchange="toggleRefusal()" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="input-group" id="refusal_container">
                <label>Refusal Reason (Country & Reason)</label>
                <input type="text" name="refusal_details" id="refusal_details">
            </div>
        </div>

        <!-- 5. Employment / Financial Details -->
        <div class="section-title">💼 Employment / Financial Details</div>
        <div class="grid">
            <div class="input-group"><label>Occupation *</label><input type="text" name="occupation" required></div>
            <div class="input-group"><label>Company Name</label><input type="text" name="company"></div>
            <div class="input-group"><label>Monthly Income *</label><input type="text" name="income" required></div>
            <div class="input-group"><label>Bank Balance *</label><input type="text" name="bank_balance" required></div>
            <div class="input-group full-width"><label>Property / Assets</label><input type="text" name="assets"></div>
            <div class="input-group full-width"><label>Sponsor Details</label><input type="text" name="sponsor"></div>
        </div>

        <div class="declaration-box">
            <input type="checkbox" id="agree" required>
            <label for="agree">I hereby declare that all the information provided is true and accurate to the best of my knowledge.</label>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">SUBMIT APPLICATION</button>
    </form>
</div>

<div id="thankYouModal" class="modal-overlay">
    <div class="modal-box">
        <h2 style="color:#1a2a6c;">Submitted!</h2>
        <p>Your details have been saved successfully. We will contact you soon.</p>
        <button class="submit-btn" style="margin-top: 15px; padding: 14px;" onclick="window.location.reload()">Done / New Form</button>
        <a href="https://northgatevisaservices.com/" class="modal-btn-secondary">Go to Home</a>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbywkghKWMbtCjfX7GMrrfTHyO2EnpiYh0Kr2U5ItIkdNHh3sKsnBOaWg4VKtMWj4IKIeA/exec';
    const form = document.getElementById('masterForm');

    function toggleCountries() {
        const status = document.getElementById('intl_travel').value;
        const container = document.getElementById('countries_container');
        container.style.display = (status === 'Yes') ? 'block' : 'none';
    }

    function toggleRefusal() {
        const status = document.getElementById('refusal_history').value;
        const container = document.getElementById('refusal_container');
        container.style.display = (status === 'Yes') ? 'block' : 'none';
        if(status === 'No') document.getElementById('refusal_details').value = '';
    }

    function toggleMaritalFields(status) {
        if (status === 'Single' || status === '') {
            document.getElementById('spouse_field').style.display = 'none';
            document.getElementById('children_field').style.display = 'none';
        } else {
            document.getElementById('spouse_field').style.display = 'block';
            document.getElementById('children_field').style.display = 'block';
        }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "Sending... Please Wait";

        fetch(scriptURL + "?" + new URLSearchParams(new FormData(form)).toString(), { method: 'GET', mode: 'no-cors' })
        .then(() => {
            document.getElementById('thankYouModal').style.display = 'block';
            form.reset();
            btn.disabled = false;
            btn.innerHTML = "SUBMIT APPLICATION";
        })
        .catch(() => {
            alert("Error in submission! Check your Script URL.");
            btn.disabled = false;
            btn.innerHTML = "SUBMIT APPLICATION";
        });
    });
</script>
</body>
</html>
