<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthGate Visa Application Form</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .form-container { background: #ffffff; max-width: 850px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #1a73e8; margin-top: 20px; margin-bottom: 40px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 180px; height: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .header h2 { color: #1a73e8; margin: 0; font-size: 24px; text-transform: uppercase; }
        .header p { color: #666; margin: 5px 0 0; font-size: 14px; }
        .section-title { background: #e8f0fe; color: #1a73e8; padding: 12px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; margin: 30px 0 15px 0; border-left: 5px solid #1a73e8; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26, 115, 232, 0.2); }
        .full-width { grid-column: 1 / -1; }
        #study_permit_section, #countries_container, #refusal_details_container, #criminal_details_container { display: none; }
        .conditional-fields { background: #f9fbfd; padding: 15px; border-radius: 8px; border: 1px dashed #1a73e8; margin-top: -10px; margin-bottom: 10px; }
        .declaration-box { grid-column: 1 / -1; margin-top: 30px; padding: 20px; background: #fff9e6; border-radius: 8px; font-size: 14px; display: flex; align-items: flex-start; gap: 12px; border: 1px solid #ffeeba; text-align: left; width: 100%; box-sizing: border-box; }
        .declaration-box input[type="checkbox"] { width: 18px; height: 18px; margin: 0; margin-top: 2px; cursor: pointer; flex-shrink: 0; }
        .declaration-box label { cursor: pointer; font-weight: 500; line-height: 1.4; margin: 0; }
        .submit-btn { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s ease; }
        .submit-btn:hover { background-color: #1557b0; }
        .submit-btn:disabled { background-color: #cccccc; }
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 12% auto; padding: 40px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        .success-icon { font-size: 60px; color: #25D366; margin-bottom: 20px; }
        .modal-btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .home-btn { width: 100%; padding: 15px; background-color: #f4f7f6; color: #333; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s ease; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .home-btn:hover { background-color: #e4e6eb; }
    </style>
</head>
<body>
<div class="form-container">
    <div class="logo-container"><img src="logo.png" alt="NorthGate Logo"></div>
    <div class="header"><p><strong>VISA APPLICANT FORM</strong></p></div>
    <form id="visaForm">
        <input type="hidden" name="form_type" value="Other">
        <div class="section-title">👤 Applicant Details</div>
        <div class="grid">
            <div class="input-group"><label>Full Name *</label><input type="text" name="full_name" required></div>
            <div class="input-group"><label>Father’s / Husband’s Name *</label><input type="text" name="father_name" required></div>
            <div class="input-group"><label>Date of Birth *</label><input type="date" name="dob" required></div>
            <div class="input-group"><label>CNIC / Passport No *</label><input type="text" name="passport_cnic" required></div>
            <div class="input-group"><label>Contact Number *</label><input type="text" name="contact" required></div>
            <div class="input-group"><label>Email Address *</label><input type="email" name="email" required></div>
        </div>
        <div class="section-title">✈️ Travel Information</div>
        <div class="grid">
            <div class="input-group"><label>Purpose of Travel *</label>
                <select name="purpose" id="purpose" onchange="toggleStudySection()" required>
                    <option value="">Select</option>
                    <option value="Visit">Visit / Tourist</option>
                    <option value="Study">Study</option>
                    <option value="Work">Work</option>
                    <option value="Immigration">Immigration</option>
                </select>
            </div>
            <div class="input-group"><label>Intended Date of Travel</label><input type="date" name="travel_date"></div>
            <div class="input-group"><label>Duration of Stay</label><input type="text" name="stay_duration"></div>
            <div class="input-group"><label>Intended Province/City</label><input type="text" name="intended_city"></div>
        </div>
        <div class="section-title">🌍 Travel History</div>
        <div class="grid">
            <div class="input-group"><label>Have you travelled internationally before? *</label>
                <select name="intl_travel" id="intl_travel" onchange="toggleTravelHistory()">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="input-group" id="countries_container"><label>Countries Visited</label><input type="text" name="countries_visited" placeholder="e.g. Turkey, UAE, UK"></div>
            <div class="input-group"><label>Previous Visa (if any)</label><input type="text" name="prev_visa"></div>
            <div class="input-group full-width"><label>Visa Refusals History (General Info)</label><textarea name="refusals" rows="2"></textarea></div>
        </div>
        <div class="section-title">👨‍👩‍👧 Family Information</div>
        <div class="grid">
            <div class="input-group"><label>Marital Status</label><input type="text" name="marital_status"></div>
            <div class="input-group"><label>Number of Dependents</label><input type="number" name="dependents"></div>
            <div class="input-group"><label>Spouse Name</label><input type="text" name="spouse_name"></div>
            <div class="input-group full-width"><label>Children Details (Ages/Names)</label><input type="text" name="children_details"></div>
            <div class="input-group"><label>Any relatives abroad? *</label>
                <select name="relatives"><option value="No">No</option><option value="Yes">Yes</option></select>
            </div>
            <div class="input-group"><label>Relative Details</label><input type="text" name="relative_info"></div>
        </div>
        <div class="section-title">💼 Employment / Financial Details</div>
        <div class="grid">
            <div class="input-group"><label>Occupation / Business *</label><input type="text" name="occupation" required></div>
            <div class="input-group"><label>Company Name *</label><input type="text" name="company" required></div>
            <div class="input-group"><label>Job Title</label><input type="text" name="job_title"></div>
            <div class="input-group"><label>Monthly Income *</label><input type="text" name="income" required></div>
            <div class="input-group"><label>Bank Balance (Approx.) *</label><input type="text" name="bank_balance" required></div>
            <div class="input-group"><label>Sponsor Details (if any)</label><input type="text" name="sponsor"></div>
        </div>
        <div id="study_permit_section">
            <div class="section-title">🎓 Study Permit Details</div>
            <div class="grid">
                <div class="input-group"><label>Name of Institution</label><input type="text" name="college_name"></div>
                <div class="input-group"><label>Program Name</label><input type="text" name="program_name"></div>
                <div class="input-group"><label>Duration of Study</label><input type="text" name="study_duration"></div>
                <div class="input-group"><label>Tuition Fee Paid?</label><select name="fee_paid"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div class="input-group"><label>GIC Available?</label><select name="gic_available"><option value="No">No</option><option value="Yes">Yes</option></select></div>
            </div>
        </div>
        <div class="section-title">🛡️ Additional Information</div>
        <div class="grid">
            <div class="input-group"><label>Ever refused visa from any country? *</label>
                <select name="any_refusal" id="any_refusal" onchange="toggleRefusalDetails()" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="input-group"><label>Any Criminal Record? *</label>
                <select name="criminal" id="criminal" onchange="toggleCriminalDetails()" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div id="refusal_details_container" class="full-width conditional-fields">
                <div class="grid" style="gap: 15px;">
                    <div class="input-group"><label>Which Country? (Refusal) *</label><input type="text" name="refused_country" id="refused_country" placeholder="e.g. Canada, UK, USA"></div>
                    <div class="input-group"><label>Reason for Refusal *</label><input type="text" name="refused_reason" id="refused_reason" placeholder="e.g. Purpose of visit not clear"></div>
                </div>
            </div>
            <div id="criminal_details_container" class="full-width conditional-fields">
                <div class="input-group" style="margin-bottom: 0;"><label>Please provide Criminal Record Details / Reason *</label><textarea name="criminal_details" id="criminal_details" rows="3" placeholder="Provide brief explanation about your record..."></textarea></div>
            </div>
            <div class="input-group full-width"><label>Medical Conditions (if any)</label><input type="text" name="medical_info"></div>
        </div>
        <div class="declaration-box">
            <input type="checkbox" id="agree" required>
            <label for="agree">I hereby declare that all the information provided is true and accurate to the best of my knowledge. I understand that providing false or misleading information may result in visa refusal.</label>
        </div>
        <button type="submit" id="submitBtn" class="submit-btn">SUBMIT APPLICATION</button>
    </form>
</div>
<div id="thankYouModal" class="modal-overlay">
    <div class="modal-box">
        <div class="success-icon">✔</div>
        <h2>Success!</h2>
        <p>Your application has been submitted successfully. We will contact you soon.</p>
        <div class="modal-btn-group">
            <button class="submit-btn" onclick="window.location.reload()">Fill New Form</button>
            <a href="https://northgatevisaservices.com/" class="home-btn">Go Back to Home</a>
        </div>
    </div>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwRS74xWfnYK-5tPEUosxFkRl9rDReHfyIVSiZwoUli-888EAXVW6OquQMA2tNpu7C0qA/exec'; 
    const form = document.getElementById('visaForm');
    const btn = document.getElementById('submitBtn');
    function toggleStudySection() { const purpose = document.getElementById('purpose').value; document.getElementById('study_permit_section').style.display = purpose === 'Study' ? 'block' : 'none'; }
    function toggleTravelHistory() { const travelStatus = document.getElementById('intl_travel').value; document.getElementById('countries_container').style.display = travelStatus === 'Yes' ? 'block' : 'none'; }
    function toggleRefusalDetails() {
        const refusalStatus = document.getElementById('any_refusal').value;
        const container = document.getElementById('refusal_details_container');
        const countryInput = document.getElementById('refused_country');
        const reasonInput = document.getElementById('refused_reason');
        if (refusalStatus === 'Yes') { container.style.display = 'block'; countryInput.required = true; reasonInput.required = true; } 
        else { container.style.display = 'none'; countryInput.required = false; reasonInput.required = false; countryInput.value = ''; reasonInput.value = ''; }
    }
    function toggleCriminalDetails() {
        const criminalStatus = document.getElementById('criminal').value;
        const container = document.getElementById('criminal_details_container');
        const detailsInput = document.getElementById('criminal_details');
        if (criminalStatus === 'Yes') { container.style.display = 'block'; detailsInput.required = true; } 
        else { container.style.display = 'none'; detailsInput.required = false; }
    }
    form.addEventListener('submit', e => {
        e.preventDefault(); btn.disabled = true; btn.innerHTML = "Processing...";
        const formData = new FormData(form); const params = new URLSearchParams(formData); params.set('form_type', 'Other');
        fetch(scriptURL + "?" + params.toString(), { method: 'GET', mode: 'no-cors' })
        .then(() => { document.getElementById('thankYouModal').style.display = 'block'; form.reset(); toggleRefusalDetails(); toggleCriminalDetails(); btn.disabled = false; btn.innerHTML = "SUBMIT APPLICATION"; })
        .catch(error => { console.error('Error!', error.message); alert("Submission failed."); btn.disabled = false; });
    });
</script>
</body>
</html>
